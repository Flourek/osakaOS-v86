<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OsakaOS</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
  <div id="screen" class="fullscreen">
    <div id="textmode" class="fullscreen" style="white-space: pre; "></div>
    <canvas id="vgamode" style="display: none"></canvas>

    <div id="controls">
      <span id="controls-bar"><span>Emulator by FLOUREK</span><span id="controls-buttons" style="margin-left: auto">

          <input id="restore_state_file" type="file" accept=".bin" onchange="restoreStateFromFile(this)">
          <button id="save-state-btn" onclick="saveState()">save</button>
          <button id="restore-state-btn" onclick="restoreState()" style="display:none">restore</button>
          <button id="clear-state-btn" onclick="clearSavedState()" style="display:none">clear</button>
          <button onclick="saveStateToFile()">dl</button>
          <button onclick="document.getElementById('restore_state_file').click()">up</button>

        </span></span>

      <!-- <div id="controls-left">
          Emulator By FLOUREK
        </div>
        <div id="controls-middle"></div>
        <div id="controls-buttons">
        </div>
      </div> -->
    </div>
  </div>

  <script src="./v86/libv86.js"></script>
  <script src="./script.js"></script>

</body>

</html>
