<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsakaOS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- ISO controls hidden for now -->
    <div id="controls" style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: none; gap: 10px;">
        <button onclick="downloadISO()"
            style="padding: 10px 15px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            ⬇️ Download ISO
        </button>
        <button onclick="triggerFileUpload()"
            style="padding: 10px 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            ⬆️ Upload ISO
        </button>
    </div>

    <div id="screen" class="fullscreen">
        <div class="fullscreen" style="white-space: pre; "></div>
        <canvas style="display: none"></canvas>
    </div>

    <script src="./v86/libv86.js"></script>
    <script src="./script.js"></script>

</body>

</html>
